name: Setup Demo Issues

on:
  push:
    branches: [main]

jobs:
  create-issues:
    name: Create demo issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check if issues already exist
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh issue list --repo ${{ github.repository }} --json number --jq 'length')
          echo "issue_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Issue 1 — Scaffold and Beautify the Home Page
        if: steps.check.outputs.issue_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Scaffold and Beautify the Home Page" \
            --body "## Task
          Scaffold and beautify the existing \`index.html\` with:
          - Event title
          - Warm welcome message mentioning Amsterdam
          - Two navigation buttons that link to the child pages:
            - **Agenda** → \`agenda.html\`
            - **Labs** → \`labs.html\`

          The blank HTML files (\`index.html\`, \`agenda.html\`, \`labs.html\`) already exist in the repo — no need to create the folder structure.

          ## Assigned to
          GitHub Coding Agent — assign this issue to Copilot via the Assignees panel on GitHub.com."

      - name: Issue 2 — Agenda Page
        if: steps.check.outputs.issue_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Agenda Page" \
            --body "## Task
          Build a child page for the Agenda.

          The page should follow the same structure and style as the home page (\`index.html\`).

          ## Assigned to
          Copilot CLI — use \`gh copilot suggest\` from the terminal to scaffold this page."

      - name: Issue 3 — Labs Page
        if: steps.check.outputs.issue_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Labs Page" \
            --body "## Task
          Build a child page for Labs.

          The page should follow the same structure and style as the home page and Agenda page.

          ## Assigned to
          Agent Mode in IDE (VS Code) — use Copilot Chat in Agent Mode, referencing the existing pages for structure."

      - name: Issue 4 — Code Review and Performance
        if: steps.check.outputs.issue_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Code Review and Performance" \
            --body "## Task
          Perform a code review of the full application:

          1. **Code quality review** using Copilot CLI with Opus — focus on best practices, error handling, accessibility
          2. **Performance review** using Copilot CLI with Codex — focus on asset optimization, render-blocking resources, caching

          The findings from each review should be filed as two new GitHub issues:
          - **Issue 6**: Code Quality Improvements (from Opus review)
          - **Issue 7**: Performance Improvements (from Codex review)

          ## Assigned to
          Copilot CLI — use \`gh copilot suggest\` for both reviews, then \`gh issue create\` to file the findings."

      - name: Issue 5 — Azure Deployment
        if: steps.check.outputs.issue_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Azure Deployment" \
            --body "## Task
          The application is already deployed to Azure Static Web Apps and a CI/CD workflow is in place (\`.github/workflows/azure-static-web-apps.yml\`).

          For this final step:
          1. Confirm all previous issues (1, 2, 3, 4, 6, 7) are closed
          2. Verify the latest changes are live at the deployed URL
          3. If anything needs to be re-triggered, use Agent Mode to run the workflow

          > ⚠️ **Prerequisite**: This issue must only be started after Issues 1, 2, 3, 4, 6, and 7 are all closed (or explicitly deferred). Deployment is the final gate.

          ## Assigned to
          Agent Mode in IDE (VS Code) — prompt: *'All issues are resolved. Verify the app is deployed and the live site reflects all the latest changes. Trigger a re-deployment if needed.'*

          ## Pre-flight requirement
          The presenter must have already:
          - Created an Azure Static Web App connected to this repository
          - Added \`AZURE_STATIC_WEB_APPS_API_TOKEN\` to the repository secrets"
